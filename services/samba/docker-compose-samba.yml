services:
  samba:
    image: dperson/samba:latest
    container_name: srv-samba
    restart: unless-stopped
    ports:
      - "139:139"
      - "445:445"
    volumes:
      - /compartido/iso9001:/share/iso9001
      - /compartido/tmp:/share/tmp
    environment:
      - TZ=America/Bogota
    command: >
      -u "epa_admin;epa123"
      -s "iso9001;/share/iso9001;yes;no;no;epa_admin"
      -s "tmp;/share/tmp;yes;no;yes;epa_admin"
