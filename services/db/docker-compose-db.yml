services:
  postgres:
    image: postgres:15-alpine
    container_name: srv-db-01
    restart: unless-stopped
    environment:
      POSTGRES_DB: epa_facturacion
      POSTGRES_USER: epa_admin
      POSTGRES_PASSWORD: EPA_secure_2025
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - /data/postgres/pgdata:/var/lib/postgresql/data/pgdata
